############################################## yum update Module ##################################
- name: ----- update nginx -----
  yum: 
    name: nginx
    state: latest # if package installed update it to latest version elif download and install latest version
    update_only: yes # check if Only, package/packages installed on remote hosts then update them 
    # security: yes
    # bugfix: yes
  tags: [update_nginx]

- name: ----- update all packages -----
  yum:
    name: '*'
    state: latest
    update_only: yes
  tags: [update_all]


- name: ----- update all packages except kernel packages -----
  yum:
    name: '*'
    state: latest
    exclude: kernel* # exclude packages you dont want to update 
    update_only: yes
  tags: [update_all_except_kernel]


############################################## yum list Module ##################################
- name: ----- yum list available packages -----
  yum:
    list: nginx
  register: yum_list_out
  tags: [yum_list]

- name: ----- yum list available packages -----
  debug:
    msg: "{{ yum_list_out }}"
  tags: [yum_list]



