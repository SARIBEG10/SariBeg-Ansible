    name: nginx
    state: present
  when: ansible_distribution == "CentOS" and ansible_distribution_major_version == "7"
  tags: nginx-mod-mail

# - name: ------- check nginx installed on centos7 -------
#   shell: rpm -qa | grep  nginx-mod-mail
#   register: nginx-mod-mail
#   tags: nginx_mod_mail

- name: ------- check nginx installed on centos7 -------
  package_facts:
     manager: rpm
  tags: nginx_mod_mail

- name: ------- check nginx installed on centos7 -------
  debug:
     var: ansible_facts.packages['nginx-mod-mail']
  tags: nginx_mod_mail

- name: ------- check nginx installed on centos7 -------
  debug:
    msg: "nginx-mod-mail is Installed"
  when: "'nginx-mod-mail' in nginx-mod-mail.output"
  tags: nginx_mod_mail

- name: ------- check /home/dir1 exist -------
  stat:
    path: /home/dir1
  register: path_out
  tags: path_out_check 

- name: ------- check /home/dir1 exist -------
  debug:
    msg: "Path Exist"
  when: path_out.stat.exists
  tags: path_out_check


- name: ------- check if test.txt contains word Ansible -------
  shell: cat /home/test.txt
  register: catty
  tags: cond_1

- name: ------- check if test.txt contains word Ansible -------
  debug:
    msg: "test.txt contain Ansible word"
  when: catty.stdout.find('Ansible') != -1
  tags: cond_1

- name: ------ Exercise Roles/vars/main.yml -------
  shell: echo "var1 is True"
  when: var1 or var2 | bool # These change variable values to boolean True or False
  tags: cond_2

- name: ------- not condition -------
  debug:
    msg: "var1 is True"
  when: not var1
  tags: cond_3



- name: ------- Exercise Ask user to delete file -------
  pause:
    prompt: "Do you want to delete /home/test.txt? (yes/no)"
  register: answer
  tags: delete_file

- name: ------- Exercise Ask user to delete file -------
  file:
    path: /home/test.txt
    state: absent
  when: hostvars[play_hosts.0].confirm_delete.user_input | bool
  tags: delete_file









################################# LOOPS #####################################################################################################

- name: ------- Basic -------
  debug:
      msg: "{{ item }}"
  with_items:
      - a1
      - a2
  tags: loop_1

- name: ------- Basic -------
  debug:
      msg: "{{ item }}"
  loop:
      - a1
      - a2
  tags: loop_2

- name: ------- Install packages on remote host -------
  yum: 
    name: ['nginx', 'curl', 'telnet']
    state: present
  tags: loop_3


- name: ------- create users on remote hosts -------
  user:
    name: "{{item }}"
    state: present 
    home: /tmp/{{item}}
    group: devops
    shell: /bin/bash
  loop: "{{ users_list }}"
  tags: create_user

- name: ------- json style loop -------
  yum:
    name: "{{item.name}}"
    state: "{{item.state}}"
  with_items:
    - {name: 'nginx', state: 'present'}
    - {name: 'telnet', state: 'absent'}
  tags: json_loop
    
- name: ------- Nested loop -------
  mysql_user:
    name: "{{ item[0] }}"
    priv: "{{ item[1] }}.*:ALL"
    state: present
    password: '123456'
    append_privs: yes # append new priviledges to previous ones
    login_user: root
  no_log: True
  with_nested:
    - ['saribeg', 'Lili']
    - ['clientdb', 'employeedb', 'providerdb']
  tags: nested_loop1

- name: ------- Dictionary Loop -------
  debug:
    msg: "{{ item.key }} - {{ item.value }}"
  loop: "{{ my_dict | dict2items }}"
  tags: dict_loop


- name: ------- Loop over Inventory -------
  debug:
    msg: "{{ item  }}"
  loop: "{{ groups['myservers'] }}"
  tags: inventory_loop1


- name: ------- Loop over Inventory -------
  debug:
    msg: "{{ item  }}"
  loop: "{{ groups['all'] }}"
  tags: inventory_loop2

- name: ------- Loop over Inventory -------
  debug:
    msg: "{{ item  }}"
  loop: "{{ ansible_play_batch }}"
  tags: inventory_loop3

- name: ------- Loop Control -------
  debug:
    msg: "{{ item  }}"
  loop: "{{ groups['myservers'] }}"
  loop_control:
      pause: 10 
  tags: loop_control1


- name: ------- Loop Index -------
  debug:
    msg: "{{ item  }} - {{ index }}"
  loop: ['first', 'second', 'third']
  loop_control:
      index_var: index
  tags: loop_control2

- name: ------- until loop -------
  shell: cat /home/test.txt
  register: catty
  until: catty.stdout.find('Ansible') != 1
  retries: 3
  delay: 10
  tags: until_loop



- name: ------- create playbook structure -------
  pause:
    prompt: "Insert your project name: "
  run_once: True
  register: project_name
  tags: playbook

- name: ------- create playbook structure -------
  file:
    path: /home/{{project_name}}
    mode: 0755
    state: directory
  run_once: True
  tags: playbook

- name: ------- create playbook structure -------
  file:
    path: /home/{{project_name}}/{{item}}
    mode: 0755
    state: directory
  with_items:
    - inventory
    - Roles
  tags: playbook

- name: ------- create playbook structure -------
  file:
    path: /home/{{item}}/hosts
    mode: 0644
    state: touch
  with_items:
    - inventory
  tags: playbook

- name: ------- create playbook structure -------
  file:
    path: /home/{{project_name}}.yml
    mode: 0644
    state: touch
  tags: playbook
  
- name: ------- create playbook structure -------
  file:
    path: /home/Roles/{{item}}
    mode: 0755
    state: directory
  with_items:
    - templates 
    - tasks
    - vars
    - defaults
    - handlers
    - meta
    - files
  tags: playbook
  
- name: ------- create playbook structure -------
  file:
    path: /home/Roles/{{item}}/main.yml
    mode: 0644
    state: touch
  with_items:
    - tasks
    - vars
    - defaults
    - handlers
    - meta
  tags: playbook
  







############################################## Ignore_errors Parameter  ##################################
# we can use this paramateres for all modules
- name: ----- Example by Command Module -----
  command: /bin/false # generate failed error
  tags: without_ignore_error

- name: ----- debug -----
  debug:
    msg: "After Error"
  tags: without_ignore_error


- name: ----- Example by Command Module -----
  command: /bin/false # generate failed error
  ignore_errors: yes
  tags: with_ignore_error

- name: ----- debug -----
  debug:
    msg: "After Error"
  tags: with_ignore_error


############################################## Async Actions ##################################
- name: ----- Async -----
  yum:
    name: '*'
    state: latest
  async: 7500 # maximum time take to finished this task on remote machines(assume 50 remote hosts)
  poll: 5 # every 5 seconds check job status
  tags: async_actions

- name: ----- debug -----
  debug:
    msg: 'Task is started'
  tags: async_actions

######### Fire and Forget ###########
- name: ----- Async -----
  yum:
    name: '*'
    state: latest
  async: 7500 # maximum time take to finished this task on remote machines(assume 50 remote hosts)
  poll: 0 
  tags: async_actions
  
- name: ----- debug -----
  debug:
    msg: 'next Task is running'
  tags: async_actions


