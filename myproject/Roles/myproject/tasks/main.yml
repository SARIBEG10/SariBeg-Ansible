############################################## Replace Module  ##################################
- name: ----- replace module -----
  replace:
      path: /etc/nginx/nginx.conf
      regexp: '               listen     80;'
      replace: '               listen     8090;'
  tags: [replace_mod]


- name: ----- replace module -----
  replace:
      path: /etc/nginx/nginx.conf
      regexp: '               listen     80;'
      replace: '               listen     8090;'
      after: 'Start after line .*' # if regex matched multiple line in file, you can specify start after position
      before: 'Start before line .*' # if regex matched multiple line in file, you can specify start before position
      backup: yes
  tags: [replace_mod]


############################################## Find Module  ##################################
