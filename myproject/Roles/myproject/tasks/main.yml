- name: ----- install apache -----
  yum:
    name: httpd
    state: present
  tags: [install_apache]

- name: ----- update apache -----
  yum:
    name: httpd
    state: latest
    update_only: yes
  tags: [update_apache]

- name: ----- security updates -----
  yum: 
    name: '*'
    state: latest
    security: yes # only security updates downloaded
  tags: [security_updates]

- name: ----- bugfix updates -----
  yum:
    name: '*'
    state: latest
    bugfix: yes # only bugfix updates downloaded
  tags: [bugfix_update]



############################################## apt Module  ##################################
- name: ----- apt install nginx -----
  apt:
    name: nginx
    state: present
  tags: [apt_mod]

- name: ----- apt update nginx -----
  apt:
    name: nginx
    state: latest
    update_only: yes
  tags: [apt_update]


- name: ----- apt .deb package install nginx -----
  apt:
    deb: /opt/debian-package.deb
  tags: [apt_deb]



- name: ----- apt purge nginx -----
  apt:
    name: [nginx, nginx-common]
    state: absent
    purge: yes # Remove Configuration files, full Remove
  tags: [apt_purge]


- name: ----- apt autoremove nginx -----
  apt:
    autoremove: yes # Remove all unused depency packages
  tags: [apt_autoremove]




############################################## Template Module  ##################################
- name: ----- template module -----
  template:
    src: nginx.conf.j2 # path to : /ansible-projects/myproject/Roles/myproject/templates/{your customized configuration files}
    dest: /etc/nginx/nginx.conf 
    owner: root
    group: root
    force: yes
    backup: yes
  tags: [template_mod]


- name: ----- change nginx port by variable -----
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf 
    owner: root
    group: root
    force: yes
    backup: yes
  tags: [nginx_port]


- name: ----- change nginx port by vars/main.yml-----
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf 
    owner: root
    group: root
    force: yes
    backup: yes
  tags: [nginx_port]


- name: ----- Apache port change Exercise -----
  template:
    src: httpd.conf.j2
    dest: /etc/httpd/conf/httpd.conf 
    owner: root
    group: root
    force: no
    backup: yes
  tags: [nginx_port]


############################################## Lineinfile Module  ##################################
- name: ----- insertafter -----
  lineinfile:
    path: /etc/nginx/nginx.conf
    insertafter: '               listen     8080;'
    line: '               listen     8083;'
  tags: [lineinfile_insertafter_mod]


- name: ----- insertbefore -----
  lineinfile:
    path: /etc/nginx/nginx.conf
    insertbefore: '               listen     8080;'
    line: '               listen     83;'
  tags: [lineinfile_insertbefore_mod]


- name: ----- insertafter -----
  lineinfile:
    path: /etc/nginx/nginx.conf
    insertafter: '               listen     8080;'
    line: '               listen     8083;'
    state: absent # delete inserted line
  tags: [lineinfile_insertafter_delete]


- name: ----- insertbefore -----
  lineinfile:
