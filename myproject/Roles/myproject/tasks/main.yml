################################# CONDITIONS ##########################################################################################

################## When Basic ##################
- set_facts: package_name = "httpd"
  when: ansible_os_family == "RedHat"

- set_facts: package_name = "apache2"
  when: ansible_os_family == "Suse"

- name: "check CPU Type Supported"
  debug: 
    msg: "The Cpu type is Not supported"
  when: ansible_machine != "x86_64"

- name: "check apache2 installed on remote  host or not "
  shell: rpm -qa | grep "apache2"
  register: apache2_output

- name: 'check if apache2 prefork installed'
  debug:
    msg: "apache2 prefork installed"
  when: "'apache2-prefork' in apache2_output.stdout"






##############################################  Package_facts Module  ##################################
- name: ------- gather package facts -------
  package_facts:
    manager: auto # apt or rpm 
  tags: [package_facts]

- name: ------- get nginx info from package_facts -------
  debug:
    var: ansible_facts.packages['nginx']
  tags: [package_facts]

- name: ------- check nginx installed or not -------
  debug: 
    msg: "Nginx is Installed"
  when: "'nginx' in ansible_facts.packages['nginx']"
  tags: [package_facts]







##############################################  Pause Module  ##################################
- name: ------- input from user -------
  pause:
    prompt: "Enter your name:" # give prompt on single remote host
  register: user_name
  tags: pause_mod

- name: ------- show user name -------
  debug:
    msg: "{{user_name}}"
  ignore_errors: yes
  tags: pause_mod

- name: ------- check if backup path is defined -------
  pause:
    prompt: "The backup_path is not defined! Please enter path:"
  register: backup_path2
  when: backup_path is not defined
  tags: pause_mod2



